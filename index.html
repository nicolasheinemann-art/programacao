<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>Pagina nicolas</title>
    <style>
        body{
        background: #f0f2f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        }
    .card {
        background: #fff;
        padding: 30xp; 
        border-radius: 12xp;
        box-shadow: 0 4xp 8xp rgba(0, 0, 0, .1);
        text-align: center;
        max-width: 350x;
        width: 100%;
    }
     h1{
         color: #333;
         margin-bottom: 10xp;
        }
    p{
            color: #666;
            font-size: 10xp;
        }
    .contador { 
            font-size: 14xp;
            font-weight: bold;
            color: #007bff;
            margin: 20xp 0;

    }
    button {
        background: #007bff;
        color: #fff;
        padding: 12xp 24xp;
        border-radius: 6xp;
        cursor: pointer;
    }
    button:hover {
      background: #0056b3;}
  </style>
</head>


<body>
<div class="card">
<h1>SENAI</h1>
      <p>pagina simples combinando HTML, CSS e JavaScript.</p>
       <div class="contador" id="numero-contador">0</div>
       <button id="botao-clique">clique aqui!</button>
     </div>
  </body>





</html>
